<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TechnoPious Premium v8</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07070a;--bg2:#0f0f15;--surface:rgba(22,22,34,0.6);--surface2:#1b1b29;
  --border:rgba(139,92,246,0.15);--border2:rgba(139,92,246,0.35);
  --accent:#8b5cf6;--accent2:#a78bfa;--accent3:#c4b5fd;
  --green:#10b981;--red:#f43f5e;--yellow:#f59e0b;
  --text:#f3f4f6;--text2:#9ca3af;--text3:#4b5563;
  --mono:'Space Mono',monospace;--sans:'Syne',sans-serif;
  --r:14px;--rs:8px;
  --sidebar-w:260px;
  --topbar-h:56px;
}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);background-image:radial-gradient(circle at 50% 0%, rgba(139,92,246,0.08) 0%, transparent 50%);}
body{font-family:var(--sans);color:var(--text);display:flex;flex-direction:column;backdrop-filter:blur(10px);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:var(--topbar-h);
  background:rgba(15,15,21,0.8);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:200;gap:10px;backdrop-filter:blur(12px);
}
.logo{font-weight:800;font-size:20px;display:flex;align-items:center;gap:8px;background:linear-gradient(to right, #fff, var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}
.badge-id {
  display:flex;align-items:center;gap:6px;background:rgba(22,22,34,0.8);border:1px solid var(--border2);
  border-radius:30px;padding:5px 12px;font-family:var(--mono);font-size:11px;color:var(--accent3);
}
.badge-id .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.menu-btn{
  width:38px;height:38px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;display:none;
}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;position:relative;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:transform .25s ease;
}
.sidebar-head{padding:14px 16px 8px;font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;}
.sb-section{padding:6px;}
.sb-label{padding:4px 10px;font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;}
.ch-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:none;background:transparent;
  color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:700;border-radius:var(--rs);cursor:pointer;text-align:left;position:relative;
}
.ch-btn:hover{background:rgba(255,255,255,0.02);color:var(--text);}
.ch-btn.active{background:rgba(139,92,246,0.12);color:var(--accent3);border-left:3px solid var(--accent);}
.ch-icon{width:26px;height:26px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;border:1px solid var(--border);}
.ch-badge{margin-left:auto;background:var(--red);color:#fff;font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;}
.dm-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);font-weight:700;border:1px solid rgba(255,255,255,0.1);}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);position:absolute;bottom:8px;left:28px;border:2px solid var(--bg2);box-shadow:0 0 4px var(--green);}
.divider{height:1px;background:var(--border);margin:4px 10px;}
.dm-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}

.discovery-btn{
  margin:4px 8px 8px;padding:10px;background:linear-gradient(135deg, var(--accent) 0%, #6d28d9 100%);
  border:none;border-radius:var(--rs);color:#fff;font-family:var(--sans);
  font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 4px 10px rgba(139,92,246,0.2);transition:all 0.2s;
}
.discovery-btn:hover{filter:brightness(1.1);transform:translateY(-1px);}

/* ── CHAT MAIN ── */
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chat-head{
  display:flex;align-items:center;gap:10px;padding:0 16px;
  height:52px;background:rgba(15,15,21,0.5);border-bottom:1px solid var(--border);flex-shrink:0;backdrop-filter:blur(10px);
}
.chat-head-icon{width:30px;height:30px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border);}
.chat-head-name{font-weight:700;font-size:14px;}
.chat-head-sub{font-size:11px;color:var(--text2);font-family:var(--mono);opacity:0.7;}
.online-pill{margin-left:auto;display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--green);background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:20px;padding:3px 10px;}
.online-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--green);}

/* PINNED CHAT BAR PANEL */
.pinned-bar{
  display:none;align-items:center;padding:6px 16px;
  background:rgba(139,92,246,0.08);border-bottom:1px solid var(--border2);
  gap:10px;animation:fadeUp 0.2s ease;
}
.pinned-bar.show{display:flex;}
.pinned-content{flex:1;min-width:0;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.pinned-content span{font-family:var(--mono);font-weight:700;color:var(--yellow);}
.pinned-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.unpin-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;}
.unpin-btn:hover{color:var(--red);background:rgba(244,63,94,0.1);}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:4px;}
.msg-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:2px;animation:fadeUp .2s ease;position:relative;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg-row.mine {flex-direction:row-reverse;}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);font-weight:700;flex-shrink:0;align-self:flex-end;border:1px solid rgba(255,255,255,0.05);}
.msg-av.hide{visibility:hidden;}
.msg-wrap{display:flex;flex-direction:column;gap:2px;max-width:75%;}
.msg-row.mine .msg-wrap{align-items:flex-end;}
.msg-name{font-size:10px;font-family:var(--mono);color:var(--accent2);padding:0 4px;}
.bubble{
  background:var(--surface);border:1px solid var(--border);border-radius:14px 14px 14px 4px;
  padding:8px 12px;font-size:14px;line-height:1.5;color:var(--text);word-break:break-word;
}
.msg-row.mine .bubble{
  background:linear-gradient(135deg, rgba(139,92,246,0.2) 0%, rgba(109,40,217,0.1) 100%);
  border-color:var(--border2);border-radius:14px 14px 4px 14px;
}
.bubble img{max-width:100%;max-height:200px;border-radius:8px;display:block;cursor:pointer;margin-top:4px;}

/* REPLY DESIGN inside bubble */
.reply-quote{
  background:rgba(0,0,0,0.3);border-left:3px solid var(--accent);
  padding:4px 8px;border-radius:4px;font-size:11px;margin-bottom:6px;
  color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.reply-quote-user{font-family:var(--mono);font-weight:700;font-size:10px;color:var(--accent2);}

/* CONTROLLER HOVER ACTIONS (REPLY & PIN) */
.action-group{
  display:flex;align-items:center;gap:4px;opacity:0;transition:opacity 0.2s;
  align-self:center;
}
.msg-row:hover .action-group{opacity:1;}
.action-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;cursor:pointer;
}
.action-btn:hover{color:#fff;background:var(--accent);border-color:var(--accent2);}
.pin-act-btn:hover{color:var(--yellow);background:rgba(245,158,11,0.15);border-color:var(--yellow);}

.msg-time{font-size:9px;font-family:var(--mono);color:var(--text3);padding:0 4px;}
.sys-msg{align-self:center;font-size:11px;font-family:var(--mono);color:var(--accent2);background:rgba(139,92,246,0.08);padding:3px 12px;border-radius:20px;margin:8px 0;}

/* REPLY PREVIEW BAR */
.reply-preview-bar{
  display:none;align-items:center;padding:6px 16px;background:var(--surface2);
  border-top:1px solid var(--border2);flex-shrink:0;gap:10px;
}
.reply-preview-bar.show{display:flex;}
.reply-preview-content{flex:1;min-width:0;border-left:3px solid var(--accent);padding-left:8px;}
.reply-preview-user{font-size:11px;font-family:var(--mono);font-weight:700;color:var(--accent2);}
.reply-preview-text{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reply-preview-close{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:0 4px;}

.typing-bar{padding:2px 16px;min-height:18px;font-size:10px;font-family:var(--mono);color:var(--text2);display:flex;align-items:center;gap:5px;}
.tdots span{display:inline-block;width:3px;height:3px;background:var(--accent);border-radius:50%;animation:td 1.2s infinite;}
.tdots span:nth-child(2){animation-delay:.2s;}
.tdots span:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,60%,100%{transform:scale(1);opacity:.5;}30%{transform:scale(1.6);opacity:1;}}

/* INPUT BAR */
.input-bar{
  display:flex;align-items:flex-end;gap:8px;padding:10px 12px;
  background:rgba(15,15,21,0.9);border-top:1px solid var(--border);flex-shrink:0; backdrop-filter:blur(10px);
}
.ico-btn{
  width:40px;height:40px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--surface);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.msg-inp{
  flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 14px;font-size:14px;color:var(--text);resize:none;outline:none;min-height:40px;max-height:100px;line-height:1.4;
}
.send-btn{
  width:40px;height:40px;border-radius:var(--rs);border:none;background:var(--accent);
  color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;
}

/* MISC */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-family:var(--mono);font-size:12px;text-align:center;}
.overlay{display:none;position:fixed;inset:0;background:rgba(5,5,8,0.8);z-index:150;backdrop-filter:blur(4px);}
.overlay.show{display:block;}
.img-preview{display:none;align-items:center;gap:10px;padding:8px 16px;background:var(--bg2);border-top:1px solid var(--border);}
.img-preview.show{display:flex;}
.prev-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;align-items:center;justify-content:center;}
.lightbox.show{display:flex;}
.lightbox img{max-width:90vw;max-height:80vh;border-radius:8px;}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:4px 14px;font-family:var(--mono);font-size:10px;
  background:rgba(251,191,36,.08);border-bottom:1px solid rgba(251,191,36,.2);
  color:var(--yellow);flex-shrink:0;
}
.status-bar.ok{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.2);color:var(--green);}
.status-bar.hide{display:none;}
#connDot{width:6px;height:6px;border-radius:50%;background:var(--yellow);}

@media(max-width:640px){
  .menu-btn{display:flex;}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:160;transform:translateX(-100%);width:80vw;}
  .sidebar.open{transform:none;}
  .action-group{opacity:1;}
}
</style>
</head>
<body>

<!-- STATUS BAR -->
<div class="status-bar" id="statusBar">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  <span id="statusText">Menghubungkan ke server...</span>
</div>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="menu-btn" id="menuBtn">☰</button>
    <div class="logo"><div class="logo-dot"></div>TechnoPious</div>
  </div>
  <div class="badge-id"><div class="dot"></div><span id="myIdLabel">--</span></div>
  <div style="display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--text2);">
    <div id="connDot"></div>
    <span id="onlineCount">1 online</span>
  </div>
</header>

<div class="overlay" id="overlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">Channels &amp; DMs</div>
    <div class="sb-section">
      <div class="sb-label">Publik Space</div>
      <button class="ch-btn active" id="btn-global"><div class="ch-icon">🌐</div><span>Global</span></button>
      <button class="ch-btn" id="btn-random"><div class="ch-icon">🎲</div><span>Matrix Room</span></button>
      <button class="ch-btn" id="btn-tech"><div class="ch-icon">⚙️</div><span>Cyber Talk</span></button>
    </div>
    <div class="divider"></div>
    <div class="sb-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
      <div class="sb-label">Direct Messages</div>
      <button class="discovery-btn" id="discoveryBtn">📡 <span>Cari Teman Anonim</span></button>
      <div class="dm-list" id="dmList"></div>
    </div>
  </aside>

  <main class="chat-main">
    <div class="chat-head">
      <div class="chat-head-icon" id="chatIcon">🌐</div>
      <div>
        <div class="chat-head-name" id="chatName">Global</div>
        <div class="chat-head-sub" id="chatSub">public · open network</div>
      </div>
      <div class="online-pill"><div class="dot"></div><span id="roomCount">1</span> online</div>
    </div>

    <!-- PINNED CHAT HEADER PANEL -->
    <div class="pinned-bar" id="pinnedBar">
      <div class="pinned-content">
        <span>📌 Tersemat:</span>
        <div class="pinned-text" id="pinnedText">Tidak ada pesan yang disematkan</div>
      </div>
      <button class="unpin-btn" id="unpinBtn" title="Lepas Pin">✕</button>
    </div>

    <div class="messages" id="messages"></div>
    <div class="typing-bar" id="typingBar"></div>

    <!-- REPLY PREVIEW BAR -->
    <div class="reply-preview-bar" id="replyPreviewBar">
      <div class="reply-preview-content">
        <div class="reply-preview-user" id="replyPreviewUser">Membalas @User</div>
        <div class="reply-preview-text" id="replyPreviewText">Isi pesan...</div>
      </div>
      <button class="reply-preview-close" id="replyPreviewClose">✕</button>
    </div>

    <!-- IMG PREVIEW -->
    <div class="img-preview" id="imgPreview">
      <img class="prev-thumb" id="prevThumb" src="" alt="">
      <div style="flex:1;font-size:11px;font-family:var(--mono);color:var(--text2)">Gambar disematkan</div>
      <button id="prevRm" style="background:transparent;border:none;color:var(--red);cursor:pointer;">✕</button>
    </div>

    <div class="input-bar">
      <button class="ico-btn" id="imgBtn">📷</button>
      <textarea class="msg-inp" id="msgInp" rows="1" placeholder="Ketik pesan..." autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
      <button class="send-btn" id="sendBtn">➔</button>
    </div>
  </main>
</div>

<div class="lightbox" id="lightbox"><img src="" id="lbImg"><button id="lbClose" style="position:absolute;top:20px;right:20px;color:#fff;background:transparent;border:none;font-size:24px;cursor:pointer;">✕</button></div>
<input type="file" id="fileInp" accept="image/*" style="display:none">

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, serverTimestamp, onDisconnect, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ── CONFIG & GENERATOR ──
const firebaseConfig = {
  apiKey: "AIzaSyDemo-TechnoPious-PublicKey",
  authDomain: "technopious-demo.firebaseapp.com",
  databaseURL: "https://technopious-chat-default-rtdb.firebaseio.com",
  projectId: "technopious-chat",
  storageBucket: "technopious-chat.appspot.com",
  messagingSenderId: "123456789",
  appId: "1:123456789:web:abcdef"
};

const COLORS = [
  {bg:'#2d1b69',text:'#c4b5fd'},{bg:'#064e3b',text:'#6ee7b7'},
  {bg:'#7f1d1d',text:'#fca5a5'},{bg:'#1e3a5f',text:'#93c5fd'},
  {bg:'#4a1d96',text:'#ddd6fe'},{bg:'#14532d',text:'#86efac'}
];
function getColor(id){let h=0;for(const c of String(id))h=((h<<5)-h)+c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length];}
function genId(){
  const w=['Anon','Ghost','Shadow','Void','Cipher','Nexus','Pixel','Echo','Neon','Phantom'];
  return w[Math.floor(Math.random()*w.length)]+(Math.floor(1000+Math.random()*9000));
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ts2time(ts){return new Date(ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});}
function compressImage(dataUrl,maxW=800,q=0.7){
  return new Promise(res=>{
    const img=new Image();img.onload=()=>{
      const ratio=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=img.width*ratio;c.height=img.height*ratio;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',q));
    };img.src=dataUrl;
  });
}

// ── STATE MANAGEMENT ──
const myId = (() => {
  let id = sessionStorage.getItem('tp_id');
  if (!id) { id = genId(); sessionStorage.setItem('tp_id', id); }
  return id;
})();

let currentRoom = 'global';
let pendingImage = null;
let selectedReplyMsg = null;
const unread = {};
const typingSet = new Set();
let typingTimer;

const pinnedRoomStorage = {};
const localMsgs = { global:[], random:[], tech:[] };
const localDMs = {};
function getDmKey(a,b){return [a,b].sort().join('|');}
function getDmMsgs(k){if(!localDMs[k])localDMs[k]=[];return localDMs[k];}

const peers = new Map();
peers.set(myId, {color: getColor(myId), lastSeen:Date.now()});

let bc;
try { bc = new BroadcastChannel('technopious_v8'); } catch(e) { bc = {postMessage:()=>{},onmessage:null}; }

// ── DOM REFS ──
const $id = id => document.getElementById(id);
const statusBar = $id('statusBar');
const statusText = $id('statusText');
const connDot = $id('connDot');
const myIdLabel = $id('myIdLabel');
const onlineCount = $id('onlineCount');
const roomCount = $id('roomCount');
const messages = $id('messages');
const typingBar = $id('typingBar');
const msgInp = $id('msgInp');
const sendBtn = $id('sendBtn');
const imgBtn = $id('imgBtn');
const fileInp = $id('fileInp');
const imgPreview = $id('imgPreview');
const prevThumb = $id('prevThumb');
const prevRm = $id('prevRm');
const lightbox = $id('lightbox');
const lbImg = $id('lbImg');
const lbClose = $id('lbClose');
const sidebar = $id('sidebar');
const overlay = $id('overlay');
const menuBtn = $id('menuBtn');
const dmList = $id('dmList');
const chatIcon = $id('chatIcon');
const chatName = $id('chatName');
const chatSub = $id('chatSub');

const replyPreviewBar = $id('replyPreviewBar');
const replyPreviewUser = $id('replyPreviewUser');
const replyPreviewText = $id('replyPreviewText');
const replyPreviewClose = $id('replyPreviewClose');

const pinnedBar = $id('pinnedBar');
const pinnedText = $id('pinnedText');
const unpinBtn = $id('unpinBtn');

// UI Init
myIdLabel.textContent = myId;
setStatus('connecting', 'Menghubungkan ke server...');

const botResponses = [
  "Halo! Sinyal GitHub kamu kencang juga ya.",
  "Salam kenal dari terminal statis sebelah 👾",
  "UI-nya lancar banget di-load lewat GitHub Pages!",
  "Fitur reply-nya aman, ini saya balas pesenmu.",
  "Mantaap! Senang bisa bertukar enkripsi data."
];

// ── FIREBASE ATTEMPT ──
let db = null;
let firebaseOk = false;
let fbListeners = {};

try {
  const app = initializeApp(firebaseConfig);
  db = getDatabase(app);

  const connRef = ref(db, '.info/connected');
  onValue(connRef, (snap) => {
    if (snap.val() === true) {
      firebaseOk = true;
      setStatus('hide', '');
      setupFirebase();
    } else {
      if (firebaseOk) setStatus('connecting', 'Koneksi terputus, mencoba ulang...');
    }
  });

  setTimeout(() => {
    if (!firebaseOk) {
      setStatus('ok', '✓ Mode lokal (chat antar tab browser)');
      setupLocalMode();
    }
  }, 4000);

} catch(e) {
  setStatus('ok', '✓ Mode lokal (chat antar tab browser)');
  setupLocalMode();
}

// ── FIREBASE ENGINE ──
function setupFirebase() {
  const presRef = ref(db, `presence/${myId}`);
  set(presRef, { id: myId, ts: serverTimestamp() });
  onDisconnect(presRef).remove();

  onValue(ref(db, 'presence'), snap => {
    const data = snap.val() || {};
    peers.clear();
    peers.set(myId, {color: getColor(myId)});
    Object.keys(data).forEach(id => {
      if (id !== myId) peers.set(id, {color: getColor(id)});
    });
    updatePeerUI();
  });

  watchRoom(currentRoom);

  onValue(ref(db, `typing/${currentRoom}`), snap => {
    const data = snap.val() || {};
    typingSet.clear();
    Object.keys(data).forEach(id => { if (id !== myId) typingSet.add(id); });
    renderTyping();
  });

  // Watch Pin Global Sync via FB
  onValue(ref(db, `pins`), snap => {
    const data = snap.val() || {};
    Object.keys(data).forEach(room => {
      pinnedRoomStorage[room] = data[room];
    });
    renderPinnedBar();
  });

  watchDMs();
}

function watchRoom(room) {
  if (fbListeners.room) { off(fbListeners.room.ref); }

  const r = ref(db, `rooms/${room}/messages`);
  fbListeners.room = { ref: r };
  localMsgs[room] = [];

  onValue(r, snap => {
    localMsgs[room] = [];
    if (snap.exists()) {
      snap.forEach(child => {
        localMsgs[room].push(child.val());
      });
    }
    if (currentRoom === room) renderMessages();
  });
}

function watchDMs() {
  const r = ref(db, `dms/${myId}`);
  onValue(r, snap => {
    if (!snap.exists()) return;
    snap.forEach(peerSnap => {
      const peer = peerSnap.key;
      const key = getDmKey(myId, peer);
      const msgs = [];
      peerSnap.forEach(msgSnap => { msgs.push(msgSnap.val()); });
      const prev = getDmMsgs(key).length;
      localDMs[key] = msgs;
      if (msgs.length > prev && currentRoom !== 'dm:' + peer) {
        const last = msgs[msgs.length - 1];
        if (last.sender !== myId) {
          unread[key] = (unread[key] || 0) + 1;
          renderDmList();
          showToast(peer, last.image ? '📷 Gambar' : last.text);
        }
      }
      if (currentRoom === 'dm:' + peer) renderMessages();
    });
  });
}

// ── LOCAL BROADCAST ENGINE ──
function setupLocalMode() {
  bc.postMessage({ type: 'presence', id: myId });
  peers.set(myId, { color: getColor(myId) });

  if (!localMsgs.global.length) {
    localMsgs.global.push(
      {id:'s0',type:'system',text:'Selamat datang di TechnoPious 👾'},
      {id:'s1',type:'system',text:'Mode lokal aktif — buka tab baru untuk simulasi chat'}
    );
  }
  if (!localMsgs.random.length) localMsgs.random.push({id:'sr',type:'system',text:'Matrix Room - Ruang diskusi bebas.'});
  if (!localMsgs.tech.length) localMsgs.tech.push({id:'st',type:'system',text:'Cyber Talk - Diskusi kode & tech.'});

  updatePeerUI();
  renderMessages();
}

bc.onmessage = (e) => {
  const d = e.data;
  if (d.type === 'presence') {
    peers.set(d.id, { color: getColor(d.id) });
    updatePeerUI();
    bc.postMessage({ type: 'presence_ack', id: myId, to: d.id });
  }
  if (d.type === 'presence_ack' && d.to === myId) {
    peers.set(d.id, { color: getColor(d.id) });
    updatePeerUI();
  }
  if (d.type === 'msg') {
    if (!localMsgs[d.room]) localMsgs[d.room] = [];
    localMsgs[d.room].push(d.msg);
    if (currentRoom === d.room) renderMessages();
  }
  if (d.type === 'dm') {
    const key = getDmKey(myId, d.from);
    getDmMsgs(key).push(d.msg);
    if (currentRoom === 'dm:' + d.from) {
      renderMessages();
    } else {
      unread[key] = (unread[key] || 0) + 1;
      renderDmList();
      showToast(d.from, d.msg.image ? '📷 Gambar' : d.msg.text);
    }
  }
  if (d.type === 'pin_sync') {
    pinnedRoomStorage[d.room] = d.pinData;
    if (currentRoom === d.room) renderPinnedBar();
  }
  if (d.type === 'typing') {
    if (d.room === currentRoom && d.id !== myId) {
      if(d.active) typingSet.add(d.id); else typingSet.delete(d.id);
      renderTyping();
    }
  }
  if (d.type === 'gone') {
    peers.delete(d.id);
    updatePeerUI();
  }
};

function updatePeerUI() {
  onlineCount.textContent = peers.size + ' online';
  roomCount.textContent = peers.size;
  renderDmList();
}

// ── DISCOVERY & CONNECTION ──
function triggerDiscovery() {
  const otherPeers = [...peers.keys()].filter(id => id !== myId);
  if (otherPeers.length > 0) {
    const randomPeer = otherPeers[Math.floor(Math.random() * otherPeers.length)];
    switchRoom('dm:' + randomPeer);
  } else {
    const mockBots = ['CipherBot', 'GhostUser', 'NeonShadow'];
    const selectedBot = mockBots[Math.floor(Math.random() * mockBots.length)];
    if(!peers.has(selectedBot)) {
      peers.set(selectedBot, { color: getColor(selectedBot) });
      const key = getDmKey(myId, selectedBot);
      localDMs[key] = [{
        id: 'bot_init',
        sender: selectedBot,
        text: "Sinyal mendeteksi kamu sedang sendirian. Enkripsi simulasi Bot diaktifkan!",
        ts: Date.now()
      }];
    }
    updatePeerUI();
    switchRoom('dm:' + selectedBot);
  }
}
$id('discoveryBtn').addEventListener('click', triggerDiscovery);

// ── PIN ENGINE ──
function initPin(sender, textContent) {
  const pinData = { sender: sender, text: textContent };
  pinnedRoomStorage[currentRoom] = pinData;
  
  if (firebaseOk && db) {
    set(ref(db, `pins/${currentRoom}`), pinData);
  } else {
    bc.postMessage({ type: 'pin_sync', room: currentRoom, pinData: pinData });
  }
  renderPinnedBar();
}

function removePin() {
  pinnedRoomStorage[currentRoom] = null;
  if (firebaseOk && db) {
    remove(ref(db, `pins/${currentRoom}`));
  } else {
    bc.postMessage({ type: 'pin_sync', room: currentRoom, pinData: null });
  }
  renderPinnedBar();
}
unpinBtn.addEventListener('click', removePin);

function renderPinnedBar() {
  const activePin = pinnedRoomStorage[currentRoom];
  if (activePin) {
    pinnedText.innerHTML = `<strong>@${esc(activePin.sender)}</strong>: ${esc(activePin.text)}`;
    pinnedBar.classList.add('show');
  } else {
    pinnedBar.classList.remove('show');
  }
}

// ── REPLY CONTROLLER ──
function initReply(msgId, sender, textContent) {
  selectedReplyMsg = { id: msgId, sender: sender, text: textContent };
  replyPreviewUser.textContent = `Membalas @${sender}`;
  replyPreviewText.textContent = textContent;
  replyPreviewBar.classList.add('show');
  msgInp.focus();
}
function cancelReply() {
  selectedReplyMsg = null;
  replyPreviewBar.classList.remove('show');
}
replyPreviewClose.addEventListener('click', cancelReply);

// ── SEND AND TYPING SIGNALS ──
async function sendMessage() {
  const text = msgInp.value.trim();
  if(!text && !pendingImage) return;

  let imgData = null;
  if (pendingImage) imgData = await compressImage(pendingImage);

  const msg = {
    id: 'm' + Date.now() + Math.random().toString(36).slice(2),
    sender: myId,
    ts: Date.now(),
    ...(text && { text }),
    ...(imgData && { image: imgData }),
    ...(selectedReplyMsg && { replyTo: selectedReplyMsg })
  };

  if (currentRoom.startsWith('dm:')) {
    const peer = currentRoom.replace('dm:', '');
    const key = getDmKey(myId, peer);
    getDmMsgs(key).push(msg);
    
    if (firebaseOk && db) {
      push(ref(db, `dms/${myId}/${peer}`), msg);
      push(ref(db, `dms/${peer}/${myId}`), msg);
    } else {
      if(!peer.endsWith('Bot') && !peer.startsWith('Ghost') && !peer.startsWith('Neon')) {
        bc.postMessage({ type: 'dm', from: myId, to: peer, msg });
      } else {
        // Simulasi Balasan Bot
        setTimeout(() => {
          const botMsg = {
            id: 'bot' + Date.now(),
            sender: peer,
            text: botResponses[Math.floor(Math.random() * botResponses.length)],
            ts: Date.now()
          };
          getDmMsgs(key).push(botMsg);
          if(currentRoom === 'dm:' + peer) renderMessages();
        }, 1000);
      }
    }
  } else {
    if (!localMsgs[currentRoom]) localMsgs[currentRoom] = [];
    localMsgs[currentRoom].push(msg);

    if (firebaseOk && db) {
      push(ref(db, `rooms/${currentRoom}/messages`), msg);
    } else {
      bc.postMessage({ type: 'msg', room: currentRoom, msg });
    }
  }

  sendTypingSignal(false);
  msgInp.value = '';
  msgInp.style.height = '40px';
  pendingImage = null;
  imgPreview.classList.remove('show');
  prevThumb.src = '';
  cancelReply();
  renderMessages();
  msgInp.focus();
}

let typingSent = false;
function sendTypingSignal(active) {
  if (!active && !typingSent) return;
  typingSent = active;
  bc.postMessage({ type: 'typing', id: myId, room: currentRoom, active });
  if (firebaseOk && db) {
    if(active) {
      set(ref(db, `typing/${currentRoom}/${myId}`), { id: myId, ts: Date.now() });
    } else {
      try { remove(ref(db, `typing/${currentRoom}/${myId}`)); } catch(e) {}
    }
  }
}

let typingInputTimer;
msgInp.addEventListener('input', () => {
  msgInp.style.height = '40px';
  msgInp.style.height = Math.min(msgInp.scrollHeight, 100) + 'px';
  sendTypingSignal(true);
  clearTimeout(typingInputTimer);
  typingInputTimer = setTimeout(() => sendTypingSignal(false), 2500);
});

// ── ROOM CONTROLLER ──
const roomMeta = {
  global: { icon:'🌐', name:'Global Space', sub:'public · open network' },
  random: { icon:'🎲', name:'Matrix Room', sub:'public · ruang acak' },
  tech:   { icon:'⚙️', name:'Cyber Talk', sub:'public · coding & tech' },
};

function switchRoom(room) {
  currentRoom = room;
  pendingImage = null;
  imgPreview.classList.remove('show');
  prevThumb.src = '';
  cancelReply();
  renderPinnedBar();

  ['global','random','tech'].forEach(r => {
    const b = $id('btn-' + r);
    if (b) b.classList.toggle('active', r === room);
  });

  if (room.startsWith('dm:')) {
    const peer = room.replace('dm:', '');
    const col = getColor(peer);
    chatIcon.innerHTML = `<div class="dm-av" style="background:${col.bg};color:${col.text};width:30px;height:30px;display:flex;align-items:center;justify-content:center;">${esc(peer.substring(0,2))}</div>`;
    chatName.textContent = peer;
    chatSub.textContent = 'Secure Session';
    const key = getDmKey(myId, peer);
    unread[key] = 0;
    renderDmList();
    if (firebaseOk && db) watchDMs();
  } else {
    chatIcon.textContent = roomMeta[room]?.icon || '💬';
    chatName.textContent = roomMeta[room]?.name || room;
    chatSub.textContent = roomMeta[room]?.sub || 'public';
    if (firebaseOk && db) watchRoom(room);
  }

  typingSet.clear();
  renderTyping();
  renderMessages();
  closeSidebar();
  msgInp.focus();
}

// ── RENDERING MESSAGES & UI ──
function renderMessages() {
  let msgs = [];
  if (currentRoom.startsWith('dm:')) {
    msgs = getDmMsgs(getDmKey(myId, currentRoom.replace('dm:', '')));
  } else {
    msgs = localMsgs[currentRoom] || [];
  }

  if (!msgs.length) {
    messages.innerHTML = '<div class="empty">Belum ada transmisi data di room ini</div>';
    return;
  }

  let html = '';
  let lastSender = null;
  msgs.forEach(msg => {
    if (msg.type === 'system') {
      html += `<div class="sys-msg">${esc(msg.text)}</div>`;
      return;
    }
    const isMe = msg.sender === myId;
    const showAv = msg.sender !== lastSender;
    const col = getColor(msg.sender);
    
    const avHtml = showAv ? `<div class="msg-av" style="background:${col.bg};color:${col.text}">${esc(msg.sender.substring(0,2))}</div>` : `<div class="msg-av hide"></div>`;
    const nameHtml = (showAv && !isMe) ? `<div class="msg-name">${esc(msg.sender)}</div>` : '';
    
    let quoteHtml = '';
    if (msg.replyTo) {
      quoteHtml = `<div class="reply-quote"><div class="reply-quote-user">@${esc(msg.replyTo.sender)}</div>${esc(msg.replyTo.text)}</div>`;
    }

    let bubbleContent = msg.image ? `${quoteHtml}<img src="${msg.image}" class="chat-img" loading="lazy">` : `${quoteHtml}${esc(msg.text)}`;
    const textForReply = msg.image ? '📷 Gambar' : msg.text;
    
    const actionGroupHtml = `
      <div class="action-group">
        <button class="action-btn" onclick="initReply('${msg.id}', '${esc(msg.sender)}', '${esc(textForReply)}')">Reply</button>
        <button class="action-btn pin-act-btn" onclick="initPin('${esc(msg.sender)}', '${esc(textForReply)}')">📌 Pin</button>
      </div>
    `;

    html += `<div class="msg-row ${isMe ? 'mine' : ''}">
      ${isMe ? '' : avHtml}
      ${isMe ? actionGroupHtml : ''}
      <div class="msg-wrap">${nameHtml}<div class="bubble">${bubbleContent}</div><div class="msg-time">${ts2time(msg.ts)}</div></div>
      ${isMe ? '' : actionGroupHtml}
      ${isMe ? avHtml : ''}
    </div>`;
    
    lastSender = msg.sender;
  });

  messages.innerHTML = html;
  messages.querySelectorAll('.chat-img').forEach(img => {
    img.onclick = () => { lbImg.src = img.src; lightbox.classList.add('show'); }
  });
  messages.scrollTop = messages.scrollHeight;
}

function renderTyping() {
  if (!typingSet.size) { typingBar.innerHTML = ''; return; }
  const names = [...typingSet].slice(0,2).map(esc).join(', ');
  typingBar.innerHTML = `<span class="tdots"><span></span><span></span><span></span></span>&nbsp;${names} mengetik...`;
}

function renderDmList() {
  const otherPeers = [...peers.keys()].filter(id => id !== myId);
  if(!otherPeers.length) {
    dmList.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--text3);text-align:center;">Klik "Cari Teman Anonim"</div>';
    return;
  }
  let html = '';
  otherPeers.forEach(id => {
    const col = getColor(id);
    const key = getDmKey(myId, id);
    const u = unread[key] || 0;
    const isActive = currentRoom === 'dm:' + id;
    html += `<button class="ch-btn dm-btn ${isActive?'active':''}" data-peer="${esc(id)}">
      <div class="dm-av" style="background:${col.bg};color:${col.text}">${esc(id.substring(0,2))}</div>
      <div class="online-dot"></div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;">${esc(id)}</span>
      ${u>0?`<span class="ch-badge">${u}</span>`:''}
    </button>`;
  });
  dmList.innerHTML = html;
  dmList.querySelectorAll('.dm-btn').forEach(b => {
    b.onclick = () => switchRoom('dm:' + b.dataset.peer);
  });
}

function showToast(peerId, preview) {
  const col = getColor(peerId);
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<div class="toast-av" style="background:${col.bg};color:${col.text}">${esc(peerId.substring(0,2))}</div>
    <div style="min-width:0"><div class="toast-name">Terminal ${esc(peerId)}</div><div class="toast-prev">${esc(preview)}</div></div>`;
  t.addEventListener('click', () => { switchRoom('dm:' + peerId); t.remove(); });
  document.body.appendChild(t);
  setTimeout(() => { if (t.parentNode) t.remove(); }, 5000);
}

function setStatus(type, msg) {
  statusBar.className = 'status-bar';
  if (type === 'ok') { statusBar.classList.add('ok'); connDot.style.background = 'var(--green)'; }
  else if (type === 'hide') { statusBar.classList.add('hide'); connDot.style.background = 'var(--green)'; return; }
  else { connDot.style.background = 'var(--yellow)'; }
  statusText.textContent = msg;
}

// ── ATTACHMENT MEDIA HANDLING ──
imgBtn.onclick = () => fileInp.click();
fileInp.onchange = function() {
  if (this.files[0]) loadImg(this.files[0]);
  this.value = '';
};
prevRm.onclick = () => {
  pendingImage = null;
  imgPreview.classList.remove('show');
  prevThumb.src = '';
};
function loadImg(file) {
  const r = new FileReader();
  r.onload = e => {
    pendingImage = e.target.result;
    prevThumb.src = pendingImage;
    imgPreview.classList.add('show');
  };
  r.readAsDataURL(file);
}

const chatArea = document.querySelector('.chat-main');
chatArea.addEventListener('dragover', e => { e.preventDefault(); chatArea.style.outline = '2px dashed var(--accent)'; });
chatArea.addEventListener('dragleave', () => { chatArea.style.outline = ''; });
chatArea.addEventListener('drop', e => {
  e.preventDefault(); chatArea.style.outline = '';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImg(f);
});
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) { loadImg(item.getAsFile()); break; }
  }
});

// ── UTILS & GLOBAL SPEC ──
lbClose.onclick = () => lightbox.classList.remove('show');
lightbox.onclick = e => { if (e.target === lightbox) lightbox.classList.remove('show'); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('show'); });

sendBtn.onclick = sendMessage;
msgInp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

['global','random','tech'].forEach(r => {
  $id('btn-' + r).addEventListener('click', () => switchRoom(r));
});

function openSidebar() { sidebar.classList.add('open'); overlay.classList.add('show'); }
function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
menuBtn.onclick = openSidebar;
overlay.onclick = closeSidebar;

window.initReply = initReply;
window.initPin = initPin;

window.addEventListener('beforeunload', () => {
  bc.postMessage({ type: 'gone', id: myId });
  if (db && firebaseOk) { try { remove(ref(db, `presence/${myId}`)); } catch(e) {} }
});

renderMessages();
renderDmList();

setInterval(() => {
  bc.postMessage({ type: 'presence', id: myId });
  if (firebaseOk && db) {
    try { set(ref(db, `presence/${myId}`), { id: myId, ts: Date.now() }); } catch(e) {}
  }
}, 25000);
</script>
</body>
</html>
